{% extends "base.html" %}
{% block title %}Удалить курс{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Удалить курс</h1>
  <p class="page-meta">Это действие нельзя отменить</p>
</div>
<div class="card form-card">
  <p>Вы уверены, что хотите удалить курс «<strong>{{ object.title }}</strong>»?</p>
  <form method="post">
    {% csrf_token %}
    <div class="actions-row">
      <input type="submit" value="Да, удалить" class="button btn-danger">
      <a href="{% url 'manage_course_list' %}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
